<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}EmissorNFSe{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #4f46e5;
      --primary-dark: #3730a3;
      --success:      #10b981;
      --danger:       #ef4444;
      --warning:      #f59e0b;
      --muted:        #6b7280;
      --border:       #e5e7eb;
      --bg:           #f3f4f6;
      --card:         #ffffff;
      --text:         #111827;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--primary);
      color: #fff;
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
    }
    header h1 { font-size: 1.15rem; font-weight: 700; }
    header .sub { opacity: .75; font-size: .875rem; margin-left: auto; }

    main { max-width: 980px; margin: 2rem auto; padding: 0 1rem; }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      margin-bottom: 1.5rem;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      padding-bottom: .75rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── Form ── */
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: .3rem;
      text-transform: uppercase;
      letter-spacing: .03em;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: .55rem .8rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .9rem;
      color: var(--text);
      background: #fff;
      transition: border-color .15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .form-group input[readonly] { background: #f9fafb; color: var(--muted); }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .form-row   { display: grid; grid-template-columns: 1fr 1fr;     gap: 1rem; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .55rem 1.2rem; border-radius: 8px;
      font-size: .875rem; font-weight: 600;
      cursor: pointer; border: none; text-decoration: none;
      transition: filter .15s, background .15s;
    }
    .btn-primary  { background: var(--primary);  color: #fff; }
    .btn-primary:hover  { background: var(--primary-dark); }
    .btn-success  { background: var(--success);  color: #fff; }
    .btn-success:hover  { filter: brightness(.9); }
    .btn-danger   { background: var(--danger);   color: #fff; }
    .btn-danger:hover   { filter: brightness(.9); }
    .btn-outline  { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
    .btn-outline:hover  { background: var(--bg); }
    .btn-sm { padding: .3rem .7rem; font-size: .8rem; }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      padding: .2rem .6rem;
      border-radius: 999px;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .badge-pendente  { background: #fef3c7; color: #92400e; }
    .badge-emitindo  { background: #dbeafe; color: #1e40af; }
    .badge-emitido   { background: #d1fae5; color: #065f46; }
    .badge-erro      { background: #fee2e2; color: #991b1b; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th {
      text-align: left; padding: .6rem 1rem;
      font-size: .75rem; font-weight: 700;
      color: var(--muted); text-transform: uppercase; letter-spacing: .04em;
      border-bottom: 1.5px solid var(--border);
    }
    td { padding: .75rem 1rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    .empty { text-align: center; color: var(--muted); padding: 2.5rem; font-size: .875rem; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid #bfdbfe; border-top-color: #1e40af;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-left: .3rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Section divider ── */
    .section-label {
      font-size: .75rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em;
      margin: 1.25rem 0 .75rem;
      padding-bottom: .4rem;
      border-bottom: 1px solid var(--border);
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <h1>📄 EmissorNFSe</h1>
    <span class="sub">{% block subtitle %}{% endblock %}</span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
