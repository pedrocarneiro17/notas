<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — EmissorNFSe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #4f46e5; --primary-dark: #3730a3;
      --danger: #ef4444; --border: #e5e7eb; --bg: #f3f4f6;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 2.5rem 2rem; width: 100%; max-width: 360px;
    }
    h1 { font-size: 1.3rem; color: #111827; margin-bottom: .25rem; }
    p.sub { font-size: .85rem; color: #6b7280; margin-bottom: 1.75rem; }
    label { display: block; font-size: .8rem; font-weight: 600;
            color: #374151; margin-bottom: .35rem; }
    input {
      width: 100%; padding: .6rem .85rem;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: .95rem; outline: none; margin-bottom: 1rem;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--primary); }
    button {
      width: 100%; padding: .7rem;
      background: var(--primary); color: #fff;
      border: none; border-radius: 8px;
      font-size: .95rem; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: var(--primary-dark); }
    .erro {
      background: #fef2f2; border: 1px solid #fecaca;
      color: var(--danger); border-radius: 8px;
      padding: .6rem .85rem; font-size: .85rem; margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>EmissorNFSe</h1>
    <p class="sub">Painel administrativo</p>
    {% if erro %}
      <div class="erro">{{ erro }}</div>
    {% endif %}
    <form method="POST">
      <label for="usuario">Usuário</label>
      <input type="text" name="usuario" id="usuario" required autofocus>
      <label for="senha">Senha</label>
      <input type="password" name="senha" id="senha" required>
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
