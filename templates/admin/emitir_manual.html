{% extends "base.html" %}
{% block title %}Emissão Manual{% endblock %}
{% block subtitle %}Emissão Manual de NFS-e{% endblock %}

{% block head %}
<style>
  .toggle-group { display: flex; gap: .5rem; }
  .toggle-group input[type=radio] { display: none; }
  .toggle-group label {
    flex: 1; text-align: center; padding: .5rem 1rem;
    border: 1.5px solid var(--border); border-radius: 8px;
    cursor: pointer; font-weight: 600; font-size: .875rem;
    color: var(--muted); transition: all .15s;
  }
  .toggle-group input[type=radio]:checked + label {
    border-color: var(--primary); background: #eef2ff; color: var(--primary);
  }
  #aliquota-wrap { display: none; margin-top: .75rem; }
  #aliquota-wrap.show { display: block; }
  .checkbox-label {
    display: flex; align-items: center; gap: .5rem;
    font-size: .9rem; color: var(--text); cursor: pointer; user-select: none;
  }
  .checkbox-label input[type=checkbox] { width: 16px; height: 16px; margin: 0; flex-shrink: 0; }
</style>
{% endblock %}

{% block content %}
<div style="margin-bottom:1rem">
  <a href="/admin" class="btn btn-outline">← Voltar</a>
</div>

<div class="card">
  <div class="card-title">Emissão Manual de NFS-e</div>

  <form method="POST" autocomplete="off">

    <!-- CLIENTE -->
    <div class="form-group">
      <label>Cliente *</label>
      <select name="cliente_id" id="cliente_id" required onchange="carregarCodigos()">
        <option value="">Selecione...</option>
        {% for nome in clientes %}
          <option value="{{ nome }}">{{ nome }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- TOMADOR -->
    <div class="section-label">Tomador do serviço</div>

    <div class="form-row">
      <div class="form-group">
        <label>Tipo de documento *</label>
        <select name="tipo_doc_tomador" id="tipo_doc" required>
          <option value="CPF">CPF</option>
          <option value="CNPJ">CNPJ</option>
        </select>
      </div>
      <div class="form-group">
        <label>CPF / CNPJ *</label>
        <input type="text" name="inscricao_tomador" id="inscricao_tomador"
               required placeholder="000.000.000-00">
      </div>
    </div>

    <div class="form-group">
      <label class="checkbox-label">
        <input type="checkbox" name="sem_cep_tomador" id="sem_cep_tomador" value="1"
               onchange="toggleCepTomador(this)">
        Não informar endereço do tomador
      </label>
    </div>

    <div id="bloco_cep_tomador">
      <div class="form-row-3">
        <div class="form-group">
          <label>CEP do tomador *</label>
          <input type="text" name="cep_tomador" id="cep_tomador" placeholder="00.000-000">
        </div>
        <div class="form-group">
          <label>Número *</label>
          <input type="text" name="numero_tomador" id="numero_tomador" placeholder="Ex: 123">
        </div>
        <div class="form-group">
          <label>Complemento</label>
          <input type="text" name="complemento_tomador" placeholder="Apto, Sala...">
        </div>
      </div>
    </div>

    <!-- SERVIÇO -->
    <div class="section-label">Serviço</div>

    <div class="form-row">
      <div class="form-group">
        <label>Competência *</label>
        <input type="text" name="data_competencia" id="data_competencia" required
               placeholder="dd/mm/aaaa" inputmode="numeric" autocomplete="off"
               data-min="{{ data_min }}" data-max="{{ data_max }}">
      </div>
      <div class="form-group">
        <label>Local de Prestação *</label>
        <input type="text" name="local_prestacao" required placeholder="Ex: Ouro Preto">
      </div>
    </div>

    <div class="form-group">
      <label>Descrição do serviço *</label>
      <textarea name="descricao_servico" required rows="4"
                placeholder="Descreva o serviço prestado..."></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Valor (R$) *</label>
        <input type="text" name="valor_servico" required placeholder="0,00" id="valor_input">
      </div>
      <div></div>
    </div>

    <!-- CÓDIGOS -->
    <div class="section-label">Códigos fiscais</div>

    <div class="form-row">
      <div class="form-group">
        <label>Código de Tributação *</label>
        <select name="codigo_tributacao" id="sel_trib" required>
          <option value="">Selecione o cliente primeiro</option>
        </select>
      </div>
      <div class="form-group">
        <label>Código NBS *</label>
        <select name="codigo_nbs" id="sel_nbs" required>
          <option value="">Selecione o cliente primeiro</option>
        </select>
      </div>
    </div>

    <!-- RETENÇÃO -->
    <div class="section-label">Retenção de ISSQN</div>

    <div class="form-group">
      <label>Há retenção de ISSQN?</label>
      <div class="toggle-group">
        <input type="radio" name="retencao_issqn" id="issqn_nao" value="0" checked>
        <label for="issqn_nao">Não</label>
        <input type="radio" name="retencao_issqn" id="issqn_sim" value="1">
        <label for="issqn_sim">Sim</label>
      </div>
      <div id="aliquota-wrap" class="form-group">
        <label>Alíquota ISSQN (%)</label>
        <input type="text" name="aliquota_issqn" id="aliquota_issqn" placeholder="Ex: 5">
      </div>
    </div>

    <div style="display:flex; justify-content:flex-end; gap:.75rem; margin-top:1.5rem;">
      <a href="/admin" class="btn btn-outline">Cancelar</a>
      <button type="submit" class="btn btn-primary">▶ Emitir NFS-e</button>
    </div>

  </form>
</div>

<script>
const _clientes = {{ clientes | tojson }};

async function carregarCodigos() {
  const id = document.getElementById('cliente_id').value;
  if (!id) return;
  const res  = await fetch('/admin/clientes/json');
  const list = await res.json();
  const c    = list.find(x => x.id === id);
  if (!c) return;

  const selTrib = document.getElementById('sel_trib');
  const selNbs  = document.getElementById('sel_nbs');

  selTrib.innerHTML = (c.codigos_tributacao || []).map(v =>
    `<option value="${v}">${v}</option>`).join('') || '<option value="">—</option>';
  selNbs.innerHTML  = (c.codigos_nbs || []).map(v =>
    `<option value="${v}">${v}</option>`).join('') || '<option value="">—</option>';
}

/* Máscara CEP */
function maskCep(input) {
  let v = input.value.replace(/\D/g, '').slice(0, 8);
  if (v.length > 5) v = v.slice(0,2) + '.' + v.slice(2,5) + '-' + v.slice(5);
  else if (v.length > 2) v = v.slice(0,2) + '.' + v.slice(2);
  input.value = v;
}
document.querySelectorAll('input[name="cep_tomador"]').forEach(el => {
  el.addEventListener('input', () => maskCep(el));
});

/* Toggle endereço tomador */
function toggleCepTomador(chk) {
  const bloco = document.getElementById('bloco_cep_tomador');
  bloco.style.display = chk.checked ? 'none' : 'block';
  document.getElementById('cep_tomador').required    = !chk.checked;
  document.getElementById('numero_tomador').required = !chk.checked;
}

/* Máscara CPF/CNPJ */
const tipoDoc   = document.getElementById('tipo_doc');
const inscricao = document.getElementById('inscricao_tomador');
function maskInscricao(v, tipo) {
  v = v.replace(/\D/g, '');
  if (tipo === 'CPF') {
    v = v.slice(0,11).replace(/(\d{3})(\d)/, '$1.$2')
        .replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2');
  } else {
    v = v.slice(0,14).replace(/(\d{2})(\d)/, '$1.$2')
        .replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1/$2')
        .replace(/(\d{4})(\d{1,2})$/, '$1-$2');
  }
  return v;
}
inscricao.addEventListener('input', () => {
  inscricao.value = maskInscricao(inscricao.value, tipoDoc.value);
});
tipoDoc.addEventListener('change', () => {
  inscricao.value = '';
  inscricao.placeholder = tipoDoc.value === 'CPF' ? '000.000.000-00' : '00.000.000/0000-00';
});

/* Máscara data */
(function() {
  const campo  = document.getElementById('data_competencia');
  const minStr = campo.dataset.min;
  const maxStr = campo.dataset.max;
  campo.addEventListener('input', function() {
    let v = this.value.replace(/\D/g, '').slice(0, 8);
    if (v.length > 4) v = v.slice(0,2) + '/' + v.slice(2,4) + '/' + v.slice(4);
    else if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
    this.value = v;
  });
  function toISO(s) {
    const p = s.split('/');
    return p.length === 3 && p[2].length === 4 ? p[2]+'-'+p[1]+'-'+p[0] : '';
  }
  campo.addEventListener('blur', function() {
    const iso = toISO(this.value);
    if (iso && (iso < minStr || iso > maxStr)) {
      alert('Data fora do período permitido.');
      this.value = '';
    }
  });
  campo.closest('form').addEventListener('submit', function(e) {
    const iso = toISO(campo.value);
    if (!iso) { e.preventDefault(); alert('Data inválida.'); campo.focus(); return; }
    if (iso < minStr || iso > maxStr) { e.preventDefault(); campo.value = ''; campo.focus(); return; }
    campo.value = iso;
  });
})();

/* Máscara valor */
document.getElementById('valor_input').addEventListener('input', function() {
  let v = this.value.replace(/\D/g, '');
  v = (parseInt(v || '0') / 100).toFixed(2).replace('.', ',')
      .replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  this.value = v;
});

/* Toggle alíquota */
document.querySelectorAll('input[name="retencao_issqn"]').forEach(r => {
  r.addEventListener('change', () => {
    document.getElementById('aliquota-wrap').classList.toggle('show', r.value === '1' && r.checked);
  });
});
</script>
{% endblock %}
