version: "3.9"
services:
  nfse:
    build: .
    ports:
      - "5000:5000"
    restart: always
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - PLAYWRIGHT_HEADLESS=1
      - DOWNLOADS_PATH=/app/downloads
      - CERTS_PATH=/app/certs
    volumes:
      - ./downloads:/app/downloads
      - ./certs:/app/certs
      - ./browser_profiles:/app/browser_profiles
